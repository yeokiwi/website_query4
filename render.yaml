services:
  - type: web
    name: website-change-monitor
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HOST
        value: "0.0.0.0"
      - key: WEBSITE_FILE
        value: /data/website.md
      - key: REPORTS_DIR
        value: /data/reports
      - key: LLM_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL_NAME
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: SEARCH_PROVIDER
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
